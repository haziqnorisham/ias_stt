<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Trap Management</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">
          <i class="bi bi-shield-lock me-2"></i>Trap Management
        </h1>
        <p class="text-muted small text-center">Enter your API key to continue.</p>

        <div class="alert alert-danger d-none" id="loginError" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="apiKey">API Key</label>
            <input
              type="password"
              class="form-control"
              id="apiKey"
              autocomplete="current-password"
              required
              autofocus
            />
          </div>
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">
            <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";
      const STORAGE_KEY = "api_key";

      // Already authenticated this session -> go straight to the app.
      if (sessionStorage.getItem(STORAGE_KEY)) {
        window.location.replace("/traps");
        return;
      }

      const form = document.getElementById("loginForm");
      const input = document.getElementById("apiKey");
      const errorBox = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove("d-none");
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorBox.classList.add("d-none");
        const key = input.value.trim();
        if (!key) {
          showError("Please enter an API key.");
          return;
        }
        btn.disabled = true;
        try {
          const res = await fetch("/api/auth/verify", {
            headers: { Authorization: "Bearer " + key },
          });
          if (res.ok) {
            sessionStorage.setItem(STORAGE_KEY, key);
            window.location.replace("/traps");
          } else {
            showError("Invalid or missing API key");
          }
        } catch (err) {
          showError("Could not reach the server. Please try again.");
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
