<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployments — Trap Management</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand mb-0 h1" href="/traps">
        <i class="bi bi-clock-history me-2"></i>Deployments
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-text text-light small" id="recordCount"></span>
        <a class="btn btn-sm btn-outline-light" href="/traps">
          <i class="bi bi-bug-fill"></i> Traps
        </a>
        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="row g-2 align-items-center mb-3">
      <div class="col-6 col-md-3">
        <select class="form-select" id="statusFilter">
          <option value="">All statuses</option>
          <option value="active">active</option>
          <option value="closed">closed</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select class="form-select" id="trapFilter">
          <option value="">All traps</option>
        </select>
      </div>
      <div class="col-12 col-md-auto">
        <button class="btn btn-outline-secondary" id="refreshBtn">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Trap ID</th>
            <th>Status</th>
            <th>Started</th>
            <th>Ended</th>
            <th>Capture</th>
            <th>Photo</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="deploymentsBody">
          <tr><td colspan="8" class="text-center text-muted py-4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Location history expand -->
    <div id="locationPanel" class="card mt-3 d-none">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-geo-alt me-1"></i>
          Location history — <strong id="locDepLabel"></strong>
        </span>
        <button type="button" class="btn-close" id="closeLocPanel"></button>
      </div>
      <div class="card-body p-3" id="locPanelContent"></div>
    </div>
  </main>

  <!-- Toasts -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/deployments.js') }}"></script>
</body>
</html>
