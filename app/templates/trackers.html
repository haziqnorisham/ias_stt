<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Trap Trackers</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-geo-alt-fill me-2"></i>Smart Trap Trackers
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-text text-light small" id="recordCount"></span>
        <a class="btn btn-sm btn-outline-light" href="/mobile">
          <i class="bi bi-phone"></i> Mobile
        </a>
        <a class="btn btn-sm btn-outline-light" href="/deployments">
          <i class="bi bi-clock-history"></i> Deployments
        </a>
        <a class="btn btn-sm btn-outline-light" href="/traps">
          <i class="bi bi-bug-fill"></i> Traps
        </a>
        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="row g-2 align-items-center mb-3">
      <div class="col-12 col-md-auto">
        <button class="btn btn-primary" id="addBtn">
          <i class="bi bi-plus-lg"></i> Add Tracker
        </button>
      </div>
      <div class="col-12 col-md">
        <input type="text" class="form-control" id="searchInput"
               placeholder="Search by Name or Device EUI..." />
      </div>
      <div class="col-6 col-md-auto">
        <select class="form-select" id="pageSize">
          <option value="10">10 / page</option>
          <option value="25" selected>25 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
      <div class="col-12 col-md-auto">
        <button class="btn btn-outline-secondary" id="refreshBtn">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th data-sort="id" class="sortable">ID</th>
            <th data-sort="display_name" class="sortable">Name</th>
            <th data-sort="device_eui" class="sortable">Device EUI</th>
            <th data-sort="latitude" class="sortable">Lat</th>
            <th data-sort="longitude" class="sortable">Lng</th>
            <th data-sort="tilt_status" class="sortable">Tilt</th>
            <th data-sort="battery" class="sortable">Battery</th>
            <th data-sort="created_date" class="sortable">Created</th>
            <th data-sort="updated_date" class="sortable">Updated</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="trackersBody">
          <tr><td colspan="10" class="text-center text-muted py-4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-between align-items-center">
      <small class="text-muted" id="pageInfo"></small>
      <div class="btn-group">
        <button class="btn btn-outline-secondary" id="prevBtn" disabled>
          <i class="bi bi-chevron-left"></i> Prev
        </button>
        <button class="btn btn-outline-secondary" id="nextBtn" disabled>
          Next <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal fade" id="trackerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="trackerForm" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="trackerModalTitle">Add Tracker</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="trackerPk" />
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Display Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f_display_name" maxlength="255" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Device EUI <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f_device_eui" maxlength="100" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Latitude</label>
                <input type="text" class="form-control" id="f_latitude" placeholder="e.g. 3.12345" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Longitude</label>
                <input type="text" class="form-control" id="f_longitude" placeholder="e.g. 101.67890" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Battery (0–100)</label>
                <input type="number" class="form-control" id="f_battery" min="0" max="100" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Tilt Status</label>
                <select class="form-select" id="f_tilt_status">
                  <option value="">—</option>
                  <option value="normal">normal</option>
                  <option value="tilted">tilted</option>
                  <option value="alert">alert</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Delete tracker <strong id="deleteLabel"></strong>? This cannot be undone.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/trackers.js') }}"></script>
</body>
</html>
