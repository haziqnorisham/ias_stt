<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Deployments</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .deploy-card { border-radius: 0.75rem; }
    .trap-header { cursor: pointer; user-select: none; }
    .toggle-switch { width: 3.5rem; height: 2rem; }
    .btn-action { min-width: 44px; min-height: 44px; padding: 0.5rem 0.75rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-phone me-2"></i>Mobile Deployments
      </span>
      <div class="d-flex align-items-center gap-2">
        <span class="text-light small" id="recordCount"></span>
        <a class="btn btn-sm btn-outline-light" href="/traps">
          <i class="bi bi-bug-fill"></i>
        </a>
        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <!-- toolbar -->
    <div class="d-flex gap-2 mb-3">
      <select class="form-select form-select-sm" id="statusFilter" style="width:auto">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>

    <div id="trapsAccordion">
      <div class="text-muted text-center py-5">Loading…</div>
    </div>
  </main>

  <!-- Edit Deployment Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="editForm" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="editModalTitle">Edit Deployment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editDepId" />
            <div class="mb-3">
              <label class="form-label">Animal Capture</label>
              <input type="text" class="form-control" id="editAnimalCapture" maxlength="255" />
            </div>
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea class="form-control" id="editNotes" maxlength="500" rows="2"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Status Toggle Modal -->
  <div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change Trap Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="mb-3">Set <strong id="statusTrapLabel"></strong> to:</p>
          <div class="d-grid gap-2">
            <button class="btn btn-success" id="activateBtn">
              <i class="bi bi-play-circle me-1"></i> Active (new deployment)
            </button>
            <button class="btn btn-warning" id="deactivateBtn">
              <i class="bi bi-stop-circle me-1"></i> Inactive (close deployment)
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Toggle -->
  <div class="modal fade" id="confirmToggleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-3">
          <p id="confirmToggleMsg"></p>
          <button class="btn btn-primary" id="confirmToggleBtn">Confirm</button>
          <button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Manual Location Modal -->
  <div class="modal fade" id="locationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Set Location</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="small text-muted mb-3">GPS requires HTTPS or localhost.<br>Enter coordinates manually or try GPS.</p>
          <input type="hidden" id="locTrapId" />
          <div class="mb-2">
            <label class="form-label small">Latitude</label>
            <input type="text" class="form-control" id="locLat" placeholder="e.g. 3.12345" />
          </div>
          <div class="mb-3">
            <label class="form-label small">Longitude</label>
            <input type="text" class="form-control" id="locLng" placeholder="e.g. 101.67890" />
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary" id="locSaveBtn">Save Coordinates</button>
            <button class="btn btn-outline-success" id="locGpsBtn">
              <i class="bi bi-geo-alt-fill me-1"></i> Try GPS
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen Image Viewer -->
  <div class="modal fade" id="imageViewer" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content bg-dark">
        <div class="modal-header border-0">
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body d-flex align-items-center justify-content-center p-0">
          <img id="fullImage" src="" class="img-fluid" style="max-height:90vh; object-fit:contain" alt="full size" />
        </div>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/mobile.js') }}"></script>
</body>
</html>
