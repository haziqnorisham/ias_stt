<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trap Management</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-bug-fill me-2"></i>Trap Management
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-text text-light small" id="recordCount"></span>
        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <!-- Toolbar -->
    <div class="row g-2 align-items-center mb-3">
      <div class="col-12 col-md-auto">
        <button class="btn btn-primary" id="addBtn">
          <i class="bi bi-plus-lg"></i> Add Trap
        </button>
      </div>
      <div class="col-12 col-md">
        <input
          type="text"
          class="form-control"
          id="searchInput"
          placeholder="Search by Trap ID or Location..."
        />
      </div>
      <div class="col-6 col-md-auto">
        <select class="form-select" id="statusFilter">
          <option value="">All statuses</option>
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>
      </div>
      <div class="col-6 col-md-auto">
        <select class="form-select" id="pageSize">
          <option value="10">10 / page</option>
          <option value="25" selected>25 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
      <div class="col-12 col-md-auto">
        <button class="btn btn-outline-secondary" id="refreshBtn">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
      <table class="table table-striped table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th data-sort="id" class="sortable">ID</th>
            <th data-sort="status" class="sortable">Status</th>
            <th data-sort="trap_id" class="sortable">Trap ID</th>
            <th data-sort="tracker_id" class="sortable">Tracker ID</th>
            <th data-sort="location" class="sortable">Location</th>
            <th data-sort="door_status" class="sortable">Door</th>
            <th data-sort="temperature" class="sortable">Temp</th>
            <th data-sort="updated_by" class="sortable">Updated By</th>
            <th data-sort="created_at" class="sortable">Created</th>
            <th data-sort="updated_at" class="sortable">Updated</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="trapsBody">
          <tr><td colspan="11" class="text-center text-muted py-4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center">
      <small class="text-muted" id="pageInfo"></small>
      <div class="btn-group">
        <button class="btn btn-outline-secondary" id="prevBtn" disabled>
          <i class="bi bi-chevron-left"></i> Prev
        </button>
        <button class="btn btn-outline-secondary" id="nextBtn" disabled>
          Next <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal fade" id="trapModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="trapForm" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="trapModalTitle">Add Trap</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="trapPk" />
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Status <span class="text-danger">*</span></label>
                <select class="form-select" id="f_status" required>
                  <option value="active">active</option>
                  <option value="inactive">inactive</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Trap ID <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f_trap_id" maxlength="50" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Tracker ID <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f_tracker_id" maxlength="50" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="f_location" maxlength="50" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Door Status</label>
                <select class="form-select" id="f_door_status">
                  <option value="">—</option>
                  <option value="open">open</option>
                  <option value="closed">closed</option>
                  <option value="unknown">unknown</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Temperature</label>
                <input type="number" step="0.01" class="form-control" id="f_temperature" />
              </div>
              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" id="f_notes" maxlength="255" rows="2"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label">
                  Updated By <span class="text-danger" id="updatedByReq">*</span>
                </label>
                <input type="text" class="form-control" id="f_updated_by" maxlength="50" />
                <div class="form-text">Required when editing. Defaults to <code>system</code> on create.</div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Delete trap <strong id="deleteLabel"></strong>? This cannot be undone.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/traps.js') }}"></script>
</body>
</html>
