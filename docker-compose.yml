services:
  app:
    build: .
    image: ias_stt:latest
    container_name: ias_stt
    ports:
      - "${FLASK_PORT:-5000}:${FLASK_PORT:-5000}"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - UWSGI_PROCESSES=${UWSGI_PROCESSES:-2}
      - UWSGI_THREADS=${UWSGI_THREADS:-2}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${FLASK_PORT:-5000}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
